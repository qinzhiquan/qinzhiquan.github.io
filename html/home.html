<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <script src="../js/vue.js"></script>
    <link rel="stylesheet" href="../js/element-ui/lib/theme-chalk/index.css">
    <script src="../js/element-ui/lib/index.js"></script>
    <link rel="stylesheet" href="../css/index.css">
</head>

<body>
    <div id="app" class="container" v-cloak>
        <h3>{{title}}</h3>
        <div class="btn-group">
            <el-button v-if="windowWhith > 750" size="mini" :type="isShowOther? 'primary' : ''" @click="changeIsShow()"
                icon="el-icon-s-opportunity" circle></el-button>
            <el-button size="mini" type="primary" @click="revocationMain()">撤销</el-button>
            <el-button size="mini" @click="reset()">重置</el-button>
        </div>
        <el-tabs size="mini" v-model="activeName" @tab-click="handleClick" type="card">
            <el-tab-pane label="A" name="table_1" lazy>
                <el-table ref="tab_1" border :data="tableData_1" style="width: 100%; text-align: center;"
                    :max-height="tableHight">
                    <el-table-column label="序号" type="index" width="50">
                    </el-table-column>
                    <el-table-column prop="selectType" label="选定" header-align="center">
                        <template slot-scope="scope">
                            <el-popover
                                v-if="(!scope.row.selectType && scope.$index == 0) || (scope.$index > 0  && tableData_1[scope.$index - 1].selectType && scope.row.selectType == '')"
                                placement="top">
                                <div style="text-align: center; margin: 0">
                                    <el-button size="mini" type="text"
                                        @click="selectDotMain( 'B', scope.$index, 1)"><span
                                            class="dot">●</span></el-button>
                                    <el-button type="text" size="mini"
                                        @click="selectDotMain( 'W', scope.$index, 1)"><span
                                            class="dot">○</span></el-button>
                                </div>
                                <el-button size="mini" type="primary" slot="reference">选定</el-button>
                            </el-popover>
                            <div class="dot_box" v-else>
                                <span class="dot" v-if="scope.row.selectType == 'B'">●</span>
                                <span class="dot" v-else-if="scope.row.selectType == 'W'">○</span>
                            </div>
                            </el-select>
                        </template>
                    </el-table-column>
                    <el-table-column v-if="isShowOther" v-for="(column, index) in tableColumns_1" :key="index"
                        :prop="column.prop" :label="column.label" max-width="30" header-align="center">
                        <template slot-scope="scope">
                            <div class="dot_box">
                                <span class="dot" v-if="scope.row[column.prop] == 'B'">●</span>
                                <span class="dot" v-else-if="scope.row[column.prop] == 'W'">○</span>
                                <span class="dot_number"
                                    v-if="scope.row[column.prop] != '-'">{{scope.row[`num_${column.prop}`]}}</span>
                            </div>
                        </template>
                    </el-table-column>
                    <el-table-column v-if="isShowOther" prop="sum_B" label="黑色" header-align="center">
                        <template slot-scope="scope">
                            <div>
                                {{tableData_1[scope.$index].sum_B}} | {{tableData_copy_1[scope.$index].sum_B}}
                            </div>
                        </template>
                    </el-table-column>
                    <el-table-column v-if="isShowOther" prop="sum_W" label="白色" header-align="center">
                        <template slot-scope="scope">
                            <div>
                                {{tableData_1[scope.$index].sum_W}} | {{tableData_copy_1[scope.$index].sum_W}}
                            </div>
                        </template>
                    </el-table-column>
                    <el-table-column prop="difference" label="差值" header-align="center">
                        <template slot-scope="scope">
                            <div>
                                {{tableData_1[scope.$index].difference}} | {{tableData_copy_1[scope.$index].difference}}
                            </div>
                        </template>
                    </el-table-column>
                    <el-table-column prop="total" label="统计" header-align="center">
                        <template slot-scope="scope">
                            <div v-if="tableData_1[scope.$index].total || tableData_copy_1[scope.$index].total">
                                {{tableData_1[scope.$index].total}} + {{tableData_copy_1[scope.$index].total}} =
                                {{tableData_1[scope.$index].total + tableData_copy_1[scope.$index].total}}
                            </div>
                        </template>
                    </el-table-column>
                </el-table>
                <el-table ref="tab_copy_1" border :data="tableData_copy_1"
                    style="width: 100%; margin-top: 5px; text-align: center;" :max-height="tableHight"
                    v-if="tableHight >= 500">
                    <el-table-column label="序号" type="index" width="50">
                    </el-table-column>
                    <el-table-column prop="selectType" label="选定" header-align="center">
                        <template slot-scope="scope">
                            <el-popover
                                v-if="(!scope.row.selectType && scope.$index == 0) || (scope.$index > 0  && tableData_copy_1[scope.$index - 1].selectType && scope.row.selectType == '')"
                                placement="top">
                                <div style="text-align: center; margin: 0">
                                    <el-button size="mini" type="text"
                                        @click="selectDotMain( 'B', scope.$index, 1)"><span
                                            class="dot">●</span></el-button>
                                    <el-button type="text" size="mini"
                                        @click="selectDotMain('W', scope.$index, 1)"><span
                                            class="dot">○</span></el-button>
                                </div>
                                <el-button size="mini" type="primary" slot="reference">选定</el-button>
                            </el-popover>
                            <div class="dot_box" v-else>
                                <span class="dot" v-if="scope.row.selectType == 'B'">●</span>
                                <span class="dot" v-else-if="scope.row.selectType == 'W'">○</span>
                            </div>
                            </el-select>
                        </template>
                    </el-table-column>
                    <el-table-column v-if="isShowOther" v-for="(column, index) in tableColumns_copy_1" :key="index"
                        :prop="column.prop" :label="column.label" max-width="50" header-align="center">
                        <template slot-scope="scope">
                            <div class="dot_box">
                                <span class="dot" v-if="scope.row[column.prop] == 'B'">●</span>
                                <span class="dot" v-else-if="scope.row[column.prop] == 'W'">○</span>
                                <span class="dot_number"
                                    v-if="scope.row[column.prop] != '-'">{{scope.row[`num_${column.prop}`]}}</span>
                            </div>
                        </template>
                    </el-table-column>
                    <el-table-column v-if="isShowOther" prop="sum_B" label="黑色" header-align="center">
                    </el-table-column>
                    <el-table-column v-if="isShowOther" prop="sum_W" label="白色" header-align="center">
                    </el-table-column>
                    <el-table-column prop="difference" label="差值" header-align="center">
                    </el-table-column>
                    <el-table-column prop="total" label="统计" header-align="center">
                    </el-table-column>
                </el-table>
            </el-tab-pane>
            <el-tab-pane label="B" name="table_2" lazy>
                <el-table ref="tab_2" border :data="tableData_2" style="width: 100%; text-align: center;"
                    :max-height="tableHight">
                    <el-table-column label="序号" type="index" width="50">
                    </el-table-column>
                    <el-table-column prop="selectType" label="选定" header-align="center">
                        <template slot-scope="scope">
                            <el-popover
                                v-if="(!scope.row.selectType && scope.$index == 0) || (scope.$index > 0  && tableData_2[scope.$index - 1].selectType && scope.row.selectType == '')"
                                placement="top">
                                <div style="text-align: center; margin: 0">
                                    <el-button size="mini" type="text"
                                        @click="selectDotMain( 'B', scope.$index, 2)"><span
                                            class="dot">●</span></el-button>
                                    <el-button type="text" size="mini"
                                        @click="selectDotMain('W', scope.$index, 2)"><span
                                            class="dot">○</span></el-button>
                                </div>
                                <el-button size="mini" type="primary" slot="reference">选定</el-button>
                            </el-popover>
                            <div class="dot_box" v-else>
                                <span class="dot" v-if="scope.row.selectType == 'B'">●</span>
                                <span class="dot" v-else-if="scope.row.selectType == 'W'">○</span>
                            </div>
                            </el-select>
                        </template>
                    </el-table-column>
                    <el-table-column v-if="isShowOther" v-for="(column, index) in tableColumns_2" :key="index"
                        :prop="column.prop" :label="column.label" max-width="50" header-align="center">
                        <template slot-scope="scope">
                            <div class="dot_box" :class="scope.row[`del_${column.prop}`] ? 'delDot': ''">
                                <span class="dot" v-if="scope.row[column.prop] == 'B'">●</span>
                                <span class="dot" v-else-if="scope.row[column.prop] == 'W'">○</span>
                                <span class="dot_number"
                                    v-if="scope.row[column.prop] != '-'">{{scope.row[`num_${column.prop}`]}}</span>
                            </div>
                        </template>
                    </el-table-column>
                    <el-table-column v-if="isShowOther" prop="sum_W" label="白色" header-align="center">
                        <template slot-scope="scope">
                            <div>
                                {{tableData_2[scope.$index].sum_W}} | {{tableData_copy_2[scope.$index].sum_W}}
                            </div>
                        </template>
                    </el-table-column>
                    <el-table-column prop="difference" label="差值" header-align="center">
                        <template slot-scope="scope">
                            <div>
                                {{tableData_2[scope.$index].difference}} | {{tableData_copy_2[scope.$index].difference}}
                            </div>
                        </template>
                    </el-table-column>
                    <el-table-column prop="total" label="统计" header-align="center">
                        <template slot-scope="scope">
                            <div v-if="tableData_2[scope.$index].total || tableData_copy_2[scope.$index].total">
                                {{tableData_2[scope.$index].total}} + {{tableData_copy_2[scope.$index].total}} =
                                {{tableData_2[scope.$index].total + tableData_copy_2[scope.$index].total}}
                            </div>
                        </template>
                    </el-table-column>
                </el-table>
                <el-table ref="tab_copy_2" border :data="tableData_copy_2"
                    style="width: 100%; margin-top: 5px; text-align: center;" :max-height="tableHight" v-if="tableHight >= 500">
                    <el-table-column label="序号" type="index" width="50">
                    </el-table-column>
                    <el-table-column prop="selectType" label="选定" header-align="center">
                        <template slot-scope="scope">
                            <el-popover
                                v-if="(!scope.row.selectType && scope.$index == 0) || (scope.$index > 0  && tableData_copy_2[scope.$index - 1].selectType && scope.row.selectType == '')"
                                placement="top">
                                <div style="text-align: center; margin: 0">
                                    <el-button size="mini" type="text"
                                        @click="selectDotMain('B', scope.$index, 2)"><span
                                            class="dot">●</span></el-button>
                                    <el-button type="text" size="mini"
                                        @click="selectDotMain('W', scope.$index, 2)"><span
                                            class="dot">○</span></el-button>
                                </div>
                                <el-button size="mini" type="primary" slot="reference">选定</el-button>
                            </el-popover>
                            <div class="dot_box" v-else>
                                <span class="dot" v-if="scope.row.selectType == 'B'">●</span>
                                <span class="dot" v-else-if="scope.row.selectType == 'W'">○</span>
                            </div>
                            </el-select>
                        </template>
                    </el-table-column>
                    <el-table-column v-if="isShowOther" v-for="(column, index) in tableColumns_2" :key="index"
                        :prop="column.prop" :label="column.label" max-width="50" header-align="center">
                        <template slot-scope="scope">
                            <div class="dot_box" :class="scope.row[`del_${column.prop}`] ? 'delDot': ''">
                                <span class="dot" v-if="scope.row[column.prop] == 'B'">●</span>
                                <span class="dot" v-else-if="scope.row[column.prop] == 'W'">○</span>
                                <span class="dot_number"
                                    v-if="scope.row[column.prop] != '-'">{{scope.row[`num_${column.prop}`]}}</span>
                            </div>
                        </template>
                    </el-table-column>
                    <el-table-column v-if="isShowOther" prop="sum_B" label="黑色" header-align="center">
                    </el-table-column>
                    <el-table-column v-if="isShowOther" prop="sum_W" label="白色" header-align="center">
                    </el-table-column>
                    <el-table-column prop="difference" label="差值" header-align="center">
                    </el-table-column>
                    <el-table-column prop="total" label="统计" header-align="center">
                    </el-table-column>
                </el-table>

            </el-tab-pane>

        </el-tabs>
        <div class="btn-group2">
            <el-button size="mini" type="primary" circle
                @click="tableScroll(activeName.split('_')[1], -100)">▲</el-button>
            <el-button size="mini" type="primary" circle
                @click="tableScroll(activeName.split('_')[1], 100)">▼</el-button>
        </div>
    </div>
    <script src="../js/data.js"></script>
    <script>
        let app = new Vue({
            el: "#app",
            data() {
                return {
                    title,
                    activeName: 'table_1',
                    isShowOther,

                    tableData_1: [],
                    tableColumns_1,
                    total_1: 0,
                    selectTime_1: 0, // 当前选定次数

                    tableData_copy_1: [],
                    tableColumns_copy_1: tableColumns_1,
                    total_copy_1: 0,
                    selectTime_copy_1: 0, // 当前选定次数

                    tableData_2: [],
                    tableColumns_2,
                    total_2: 0,
                    selectTime_2: 0, // 当前选定次数

                    tableData_copy_2: [],
                    tableColumns_copy_2: tableColumns_2,
                    total_copy_2: 0,
                    selectTime_copy_2: 0, // 当前选定次数

                    del_data: [], // 归零的数据

                    windowWhith: 0,
                    tableHight: 250,
                }
            },
            created() {

                this.windowWhith = window.innerWidth || document.documentElement.clientWidth;

                this.tableHight = this.windowWhith >= 750 ? 550 : 450
            },
            mounted() {

                this.checkLogin()
                this.initPage()
                this.initTableData()
            },
            methods: {
                // 表格滚动
                tableScroll(table_index = 1, height = 10) {
                    const table = this.$refs[`tab_${table_index}`]
                    const divData = table.bodyWrapper
                    if (divData.clientHeight + divData.scrollTop != divData.scrollHeight) {
                        divData.scrollTop += height
                    } else {
                        // divData.scrollTop = 0
                    }

                    const table_copy = this.$refs[`tab_copy_${table_index}`]
                    if(!table_copy){
                        return
                    }
                    const divData_copy = table_copy.bodyWrapper
                    if (divData_copy.clientHeight + divData_copy.scrollTop != divData_copy.scrollHeight) {
                        divData_copy.scrollTop += height
                    } else {
                        // divData_copy.scrollTop = 0
                    }
                },
                // 重置
                reset() {
                    let table_index = Number(this.activeName.split('_')[1])
                    switch (table_index) {
                        case 1:
                            this.tableData_1 = JSON.parse(JSON.stringify(tableData_1))
                            this.total_1 = 0
                            this.selectTime_1 = 0
                            this.countData(this.tableData_1[0], 1)

                            this.tableData_copy_1 = JSON.parse(JSON.stringify(tableData_1))
                            this.selectTime_copy_1 = 0
                            this.total_copy_1 = 0
                            this.countData(this.tableData_copy_1[0], 1)
                            break;
                        case 2:
                            this.tableData_2 = JSON.parse(JSON.stringify(tableData_2))
                            this.total_2 = 0
                            this.selectTime_2 = 0
                            this.countData(this.tableData_2[0], 2)

                            this.tableData_copy_2 = JSON.parse(JSON.stringify(tableData_2))
                            this.selectTime_copy_2 = 0
                            this.total_copy_2 = 0
                            this.countData(this.tableData_copy_2[0], 1)
                            break;
                    }
                },
                // 撤销
                revocationMain() {

                    this.revocation()
                    this.revocation_copy()
                },
                revocation() {
                    let table_index = Number(this.activeName.split('_')[1])
                    if (this[`selectTime_${table_index}`] <= 0) {
                        this.$message({
                            message: '当前没有可撤销的记录'
                            , type: 'warning'
                        })
                        return
                    }

                    // 清空上一行数据的统计值
                    let beforeData = this[`tableData_${table_index}`][this[`selectTime_${table_index}`] - 1]
                    if (beforeData.selectType === 'B') {
                        this[`total_${table_index}`] = beforeData.total - beforeData.sum_B + beforeData.sum_W
                    } else {
                        this[`total_${table_index}`] = beforeData.total - beforeData.sum_W + beforeData.sum_B
                    }
                    beforeData.total = ''
                    beforeData.selectType = ''

                    // 清空当前行数据的下标和值
                    let rowData = this[`tableData_${table_index}`][this[`selectTime_${table_index}`]]
                    rowData.sum_B = ''
                    rowData.sum_W = ''
                    rowData.difference = ''


                    let column_length = 0
                    switch (table_index) {
                        case 1:
                            column_length = table_length_1
                            break;
                        case 2:
                            column_length = table_length_2
                            break;
                    }
                    for (let i = 1; i <= column_length; i++) {
                        rowData[`num_${i}`] = ''

                        // 如果上一行未归零 当前行取消归零
                        if (!beforeData[`del_${i}`]) {
                            rowData[`del_${i}`] = false
                            this.setNoDel(this[`tableData_${table_index}`], [this[`selectTime_${table_index}`]], i, column_length)
                        }
                    }


                    this[`selectTime_${table_index}`] -= 1
                    if (this[`selectTime_${table_index}`] > 7) {
                        this.tableScroll(table_index, -35)
                    }
                },
                // 撤销
                revocation_copy() {
                    let table_index = Number(this.activeName.split('_')[1])
                    if (this[`selectTime_copy_${table_index}`] <= 0) {
                        this.$message({
                            message: '当前没有可撤销的记录'
                            , type: 'warning'
                        })
                        return
                    }

                    // 清空上一行数据的统计值
                    let beforeData = this[`tableData_copy_${table_index}`][this[`selectTime_copy_${table_index}`] - 1]
                    if (beforeData.selectType === 'B') {
                        this[`total_copy_${table_index}`] = beforeData.total - beforeData.sum_B + beforeData.sum_W
                    } else {
                        this[`total_copy_${table_index}`] = beforeData.total - beforeData.sum_W + beforeData.sum_B
                    }
                    beforeData.total = ''
                    beforeData.selectType = ''

                    // 清空当前行数据的下标和值
                    let rowData = this[`tableData_copy_${table_index}`][this[`selectTime_copy_${table_index}`]]
                    rowData.sum_B = ''
                    rowData.sum_W = ''
                    rowData.difference = ''


                    let column_length = 0
                    switch (table_index) {
                        case 1:
                            column_length = table_length_1
                            break;
                        case 2:
                            column_length = table_length_2
                            break;
                    }
                    for (let i = 1; i <= column_length; i++) {
                        rowData[`num_${i}`] = ''

                        // 如果上一行未归零 当前行取消归零
                        if (!beforeData[`del_${i}`]) {
                            rowData[`del_${i}`] = false
                            this.setNoDel(this[`tableData_copy_${table_index}`], [this[`selectTime_copy_${table_index}`]], i, column_length)
                        }
                    }


                    this[`selectTime_copy_${table_index}`] -= 1
                },
                changeIsShow() {
                    this.isShowOther = !this.isShowOther
                },
                // 初始化
                initPage() {
                    if (bg) {
                        document.body.style.backgroundImage = `url(.${bg})`;
                        document.body.style.backgroundRepeat = "no-repeat";
                        document.body.style.backgroundSize = "100% 100%";
                        document.body.style.backgroundAttachment = "fixed";
                        document.body.style.backgroundPosition = "center";
                    }
                    if (bgColor) {
                        document.body.style.backgroundColor = bgColor;
                    }
                },
                // 判断是否已登录
                checkLogin() {
                    if (!localStorage.getItem('token')) {
                        window.location.href = '../index.html'
                    }
                },
                handleClick(tab, event) {
                },
                // 初始化表格数据
                initTableData() {
                    document.title = title;
                    this.tableData_1 = JSON.parse(JSON.stringify(tableData_1))
                    this.tableData_2 = JSON.parse(JSON.stringify(tableData_2))

                    this.tableData_copy_1 = JSON.parse(JSON.stringify(tableData_1))
                    this.tableData_copy_2 = JSON.parse(JSON.stringify(tableData_2))

                    this.countData(this.tableData_1[0], 1)
                    this.countData(this.tableData_2[0], 2)

                    this.countData(this.tableData_copy_1[0], 1)
                    this.countData(this.tableData_copy_2[0], 2)
                },

                // 计算黑色、白色、差值
                countData(row, table_index) {
                    let sum_B = 0
                    let sum_W = 0
                    let difference = 0
                    for (let i = 0; i < this[`tableColumns_${table_index}`].length; i++) {
                        if (!row[`del_${this[`tableColumns_${table_index}`][i].prop}`] && row[this[`tableColumns_${table_index}`][i].prop] == 'B') {
                            sum_B += row[`num_${this[`tableColumns_${table_index}`][i].prop}`]
                        }
                        else if (!row[`del_${this[`tableColumns_${table_index}`][i].prop}`] && row[this[`tableColumns_${table_index}`][i].prop] == 'W') {
                            sum_W += row[`num_${this[`tableColumns_${table_index}`][i].prop}`]
                        }
                    }
                    if (sum_B > sum_W) {
                        difference = '黑' + (sum_B - sum_W)
                    }
                    else if (sum_B < sum_W) {
                        difference = '白' + (sum_W - sum_B)
                    }
                    else {
                        difference = 0
                    }
                    this.$set(row, 'sum_B', sum_B)
                    this.$set(row, 'sum_W', sum_W)
                    this.$set(row, 'difference', difference)
                },
                // 计算统计值
                countTotal(row, type, table_index) {
                    let total = 0
                    if (type == 'B') {
                        total = row.sum_B - row.sum_W
                    }
                    else if (type == 'W') {
                        total = row.sum_W - row.sum_B
                    }
                    this[`total_${table_index}`] += total
                    row.total = this[`total_${table_index}`]
                },
                // 计算统计值
                countTotal_copy(row, type, table_index) {
                    let total = 0
                    if (type == 'B') {
                        total = row.sum_B - row.sum_W
                    }
                    else if (type == 'W') {
                        total = row.sum_W - row.sum_B
                    }
                    this[`total_copy_${table_index}`] += total
                    row.total = this[`total_copy_${table_index}`]

                },
                // 选定
                selectDotMain(type, row_index, table_index) {
                    this.selectDot(this[`tableData_${table_index}`][row_index], type, row_index, table_index)
                    this.selectDot_copy(this[`tableData_copy_${table_index}`][row_index], type, row_index, table_index)
                },
                // 选定
                selectDot(row, type, row_index, table_index) {
                    row.selectType = type
                    let column_length = 0
                    switch (table_index) {
                        case 1:
                            column_length = table_length_1
                            break;
                        case 2:
                            column_length = table_length_2
                            break;
                    }
                    this[`selectTime_${table_index}`]++
                    if (this[`selectTime_${table_index}`] > 7) {
                        this.tableScroll(table_index, 35)
                    }

                    // 计算统计值
                    this.countTotal(row, type, table_index)

                    // 判断是否为最后一行
                    if (this[`tableData_${table_index}`].length - 1 > row_index) {
                        let next_row = this[`tableData_${table_index}`][row_index + 1]

                        for (let i = 1; i <= column_length; i++) {
                            if (table_index == 1) {
                                // 大于max_number归一
                                if (!row[`del_${i}`] && next_row[i] != '-') {
                                    if (row_index < 6) {
                                        if (row[i] != '-' && row[i] != type) {
                                            let number = row[`num_${i}`] * 2
                                            next_row[`num_${i}`] = number > max_number ? 1 : number
                                        } else {
                                            next_row[`num_${i}`] = 1
                                        }
                                    } else {
                                        if (row[i] != '-' && row[i] == type) {
                                            let number = row[`num_${i}`] * 2
                                            next_row[`num_${i}`] = number > max_number ? 1 : number
                                        } else {
                                            next_row[`num_${i}`] = 1
                                        }
                                    }

                                }
                            }



                            if (table_index == 2) {
                                let number = row[`num_${i}`] * 2

                                if (!row[`del_${i}`] && next_row[i] != '-' && !next_row[`del_${i}`]) {
                                    if (row[i] != '-' && row[i] != type) {
                                        next_row[`num_${i}`] = number > max_number ? 1 : number
                                        if (next_row[`num_${i}`] == 32) {
                                            this.$message.info(`左表第${i}列第${row_index + 2}行往下停止计算`)
                                            this.setDel(this[`tableData_${table_index}`], row_index + 2, i, column_length)
                                        }

                                    } else {
                                        next_row[`num_${i}`] = 1
                                    }
                                }

                            }


                            if (row[`del_${i}`]) {

                                row[`num_${i}`] = ''
                                next_row[`num_${i}`] = ''
                            }
                        }
                        this.countData(next_row, table_index)
                    }


                },

                // 选定
                selectDot_copy(row, type, row_index, table_index) {
                    row.selectType = type
                    let column_length = 0
                    switch (table_index) {
                        case 1:
                            column_length = table_length_1
                            break;
                        case 2:
                            column_length = table_length_2
                            break;
                    }
                    this[`selectTime_copy_${table_index}`]++
                    if (this[`selectTime_copy_${table_index}`] > 7) {
                        this.tableScroll(table_index, 35)
                    }

                    // 计算统计值
                    this.countTotal_copy(row, type, table_index)

                    // 判断是否为最后一行
                    if (this[`tableData_copy_${table_index}`].length - 1 > row_index) {
                        let next_row = this[`tableData_copy_${table_index}`][row_index + 1]

                        for (let i = 1; i <= column_length; i++) {


                            if (table_index == 1) {
                                // 大于max_number归一
                                if (!row[`del_${i}`] && next_row[i] != '-') {
                                    if (row_index < 6) {
                                        if (row[i] != '-' && row[i] == type) {
                                            let number = row[`num_${i}`] * 2
                                            next_row[`num_${i}`] = number > max_number ? 1 : number
                                        } else {
                                            next_row[`num_${i}`] = 1
                                        }
                                    } else {
                                        if (row[i] != '-' && row[i] != type) {
                                            let number = row[`num_${i}`] * 2
                                            next_row[`num_${i}`] = number > max_number ? 1 : number
                                        } else {
                                            next_row[`num_${i}`] = 1
                                        }
                                    }

                                }
                            }


                            if (table_index == 2) {
                                let number = row[`num_${i}`] * 2

                                if (!row[`del_${i}`] && next_row[i] != '-' && !next_row[`del_${i}`]) {
                                    if (row[i] != '-' && row[i] == type) {
                                        next_row[`num_${i}`] = number > max_number ? 1 : number
                                        if (next_row[`num_${i}`] == 32) {
                                            this.$message.info(`右表第${i}列第${row_index + 2}行往下停止计算`)
                                            this.setDel(this[`tableData_copy_${table_index}`], row_index + 2, i, column_length)
                                        }
                                    } else {
                                        next_row[`num_${i}`] = 1
                                    }
                                }
                            }


                            if (row[`del_${i}`]) {

                                row[`num_${i}`] = ''
                                next_row[`num_${i}`] = ''
                            }
                        }
                        this.countData(next_row, table_index)
                    }

                },

                // 归零
                setDel(data, row, column, column_length) {
                    for (let i = row, length = data.length; i < length; i++) {
                        for (let j = 0; j < column_length; j++) {
                            if (j == column) {
                                data[i][`del_${j}`] = true
                                data[i][`num_${j}`] = ''
                            }

                        }

                    }
                },
                // 取消归零
                setNoDel(data, row, column, column_length) {
                    for (let i = row, length = data.length; i < length; i++) {
                        for (let j = 0; j < column_length; j++) {
                            if (j == column) {
                                data[i][`del_${j}`] = false
                            }
                        }
                    }
                }

            }

        })
    </script>
